<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoIA - Assistente Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #C9A84C;
            --gold-dim: rgba(201, 168, 76, 0.12);
            --gold-border: rgba(201, 168, 76, 0.22);
            --dark: #0C0C0C;
            --surface: #131313;
            --surface2: #1A1A1A;
            --surface3: #222;
            --border: rgba(255, 255, 255, 0.06);
            --text: #F0EDE4;
            --text2: #A8A39A;
            --text3: #555;
            --radius: 14px;
        }

        body {
            height: 100vh;
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }

        .shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            max-width: 680px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        .name { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
        .online { font-size: 11px; color: #4ade80; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .user-tag { 
            font-size: 11px; color: var(--gold); background: var(--gold-dim); 
            border: 1px solid var(--gold-border); padding: 4px 12px; border-radius: 100px;
            display: none; font-weight: 500;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

        .row { display: flex; gap: 10px; align-items: flex-end; animation: fadeIn 0.3s ease; }
        .row.user { flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: var(--radius);
        }
        .row.bot .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .row.user .bubble { background: var(--gold); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }

        .typing { display: flex; gap: 4px; padding: 10px; }
        .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-bar { padding: 20px; border-top: 1px solid var(--border); background: var(--surface); }
        .input-wrap {
            display: flex;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            gap: 10px;
            transition: 0.2s;
        }
        .input-wrap:focus-within { border-color: var(--gold-border); box-shadow: 0 0 0 2px var(--gold-dim); }

        input, textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: inherit; font-size: 14px;
            resize: none;
        }
        .send-btn {
            background: var(--gold); border: none; width: 34px; height: 34px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: 0.2s; color: #000;
        }
        .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

<div class="shell">
    <header>
        <!-- Logo do projeto -->
        <img src="C:\Users\Victor\Downloads\MonoIA\MonoIA\image.jpg\Frame_4-removebg-preview (1).png" alt="MonoIA" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2592/2592216.png'">
        <div>
            <div class="name">MonoIA</div>
            <div class="online"><span class="dot"></span> Online</div>
        </div>
        <div class="header-right">
            <span class="user-tag" id="userTag"></span>
        </div>
    </header>

    <div class="messages" id="chat"></div>

    <div class="input-bar">
        <div class="input-wrap" id="inputContainer">
            <!-- Dinâmico via JS -->
        </div>
    </div>
</div>

<script>
    const chatEl = document.getElementById('chat');
    const inputContainer = document.getElementById('inputContainer');
    const userTag = document.getElementById('userTag');
    
    let currentUser = { nome: null, cpf: null };
    const API_URL = "http://127.0.0.1:5000";

    // 1. FUNÇÕES DE SUPORTE (MANTIDAS)
    function addMsg(text, who) {
        const row = document.createElement('div');
        row.className = `row ${who}`;
        row.innerHTML = `<div class="bubble">${text}</div>`;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'row bot';
        row.id = 'typing-indicator';
        row.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function removeTyping() {
        document.getElementById('typing-indicator')?.remove();
    }

    function formatCPF(v) {
        v = v.replace(/\D/g, '').slice(0, 11);
        if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, '$1.$2.$3-$4');
        if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
        if (v.length > 3) return v.replace(/(\d{3})(\d+)/, '$1.$2');
        return v;
    }

    // 2. INTERFACE DINÂMICA
    function setInputMode(mode) {
        if (mode === 'CPF') {
            inputContainer.innerHTML = `
                <input type="text" id="cpfInp" placeholder="Digite seu CPF para login..." maxlength="14" autocomplete="off">
                <button class="send-btn" id="sendCpf" disabled>➔</button>
            `;
            const inp = document.getElementById('cpfInp');
            const btn = document.getElementById('sendCpf');
            inp.focus();
            inp.addEventListener('input', (e) => {
                e.target.value = formatCPF(e.target.value);
                btn.disabled = e.target.value.length < 14;
            });
            btn.onclick = () => handleLogin(inp.value);
            inp.onkeydown = (e) => { if(e.key === 'Enter' && !btn.disabled) btn.click(); };
        } else {
            inputContainer.innerHTML = `
                <textarea id="msgInp" placeholder="Mudar limite para 5000..." rows="1"></textarea>
                <button class="send-btn" id="sendMsg" disabled>➔</button>
            `;
            const btn = document.getElementById('sendMsg');
            const area = document.getElementById('msgInp');
            area.focus();
            area.addEventListener('input', () => {
                btn.disabled = !area.value.trim();
                area.style.height = 'auto';
                area.style.height = (area.scrollHeight) + 'px';
            });
            btn.onclick = () => handleChat(area.value);
            area.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };
        }
    }

    // 3. LÓGICA DE LOGIN
    async function handleLogin(cpf) {
        addMsg(cpf, 'user');
        showTyping();
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cpf: cpf })
            });
            const data = await res.json();
            removeTyping();

            if (data.status === 'ok') {
                currentUser.nome = data.nome;
                currentUser.cpf = cpf;
                userTag.innerText = data.nome.split(' ')[0];
                userTag.style.display = 'block';
                addMsg(`Olá <b>${data.nome}</b>! Como posso ajudar hoje?`, 'bot');
                setInputMode('CHAT');
            } else {
                addMsg("CPF não encontrado.", "bot");
            }
        } catch (err) {
            removeTyping();
            addMsg("Erro de conexão com o servidor.", "bot");
        }
    }

    // 4. A NOVA FUNÇÃO HANDLECHAT (Onde você tinha a dúvida)
    async function handleChat(msg) {
        if (!msg.trim()) return;
        
        addMsg(msg, 'user');
        
        // Limpa o campo imediatamente
        const area = document.getElementById('msgInp');
        if(area) {
            area.value = '';
            area.style.height = 'auto';
        }
        
        showTyping();

        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: msg, 
                    cpf: currentUser.cpf 
                })
            });
            const data = await res.json();
            removeTyping();
            addMsg(data.reply, 'bot');
        } catch (err) {
            removeTyping();
            addMsg("Erro ao processar. Verifique o servidor.", "bot");
        }
    }

    window.onload = () => {
        addMsg("Olá! 👋 Sou o assistente MonoIA. Por favor, informe o seu CPF para começarmos.", "bot");
        setInputMode('CPF');
    };
</script>

</body>
</html>
